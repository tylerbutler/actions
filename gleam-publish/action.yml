name: 'Gleam Publish'
description: 'Publish Gleam packages to Hex.pm in dependency order, skipping already-published versions'

inputs:
  packages:
    description: |
      Space-separated list of package directories to publish, in dependency order.
      Each entry is a path relative to working-directory. Use `.` for the root package.
      Example: `. packages/utils packages/main`
    required: true
  working-directory:
    description: 'Root directory of the repository'
    required: false
    default: '.'
  hex-api-key:
    description: 'Hex.pm API key for authentication'
    required: true
  skip-already-published:
    description: 'Skip (instead of fail) when a package version is already published on Hex'
    required: false
    default: 'true'
  replace-path-deps:
    description: |
      Rewrite path dependencies to Hex version ranges before publishing.
      Newline-separated entries in the format: `dep-name:version-toml-path`

      For each entry, any package with a path dependency on `dep-name` will have it
      replaced with a semver-compatible Hex version range read from the `version` key
      in the TOML file at `version-toml-path` (relative to working-directory).

      Version range logic follows semver conventions:
        - Pre-1.0 (0.x.y): `">= 0.x.y and < 0.(x+1).0"` (minor is breaking)
        - Post-1.0 (x.y.z): `">= x.y.z and < (x+1).0.0"` (major is breaking)

      Example:
        vestibule:gleam.toml
      This reads the version from the root gleam.toml and rewrites
      `vestibule = { path = "..." }` to a Hex version range in all sub-packages
      before publishing.
    required: false
    default: ''

outputs:
  published:
    description: 'Space-separated list of packages that were successfully published'
    value: ${{ steps.publish.outputs.published }}
  skipped:
    description: 'Space-separated list of packages that were skipped (already published)'
    value: ${{ steps.publish.outputs.skipped }}

runs:
  using: composite
  steps:
    - name: Rewrite path dependencies
      if: inputs.replace-path-deps != ''
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        REPLACE_PATH_DEPS: ${{ inputs.replace-path-deps }}
        PACKAGES: ${{ inputs.packages }}
      run: |
        while IFS= read -r line; do
          [ -z "$line" ] && continue
          dep_name=$(echo "$line" | cut -d: -f1 | xargs)
          version_toml=$(echo "$line" | cut -d: -f2 | xargs)

          if [ ! -f "$version_toml" ]; then
            echo "::error::Version source file not found: $version_toml"
            exit 1
          fi

          dep_version=$(grep '^version' "$version_toml" | head -1 | sed 's/version = "\(.*\)"/\1/')
          major=$(echo "$dep_version" | cut -d. -f1)
          minor=$(echo "$dep_version" | cut -d. -f2)

          if [ "$major" -eq 0 ]; then
            # Pre-1.0: minor version is the compatibility boundary
            next_minor=$((minor + 1))
            hex_range=">= $dep_version and < 0.$next_minor.0"
          else
            # Post-1.0: major version is the compatibility boundary
            next_major=$((major + 1))
            hex_range=">= $dep_version and < $next_major.0.0"
          fi

          echo "Dependency $dep_name: version $dep_version → \"$hex_range\""

          for pkg_dir in $PACKAGES; do
            toml="$pkg_dir/gleam.toml"
            [ ! -f "$toml" ] && continue
            # Match path deps in any format: { path = "..." } with optional extra fields
            if grep -q "${dep_name} = { path = " "$toml"; then
              sed -i "s|${dep_name} = { path = \"[^\"]*\" }|${dep_name} = \"${hex_range}\"|" "$toml"
              echo "  Rewrote $toml"
              rm -f "$pkg_dir/manifest.toml"
              echo "  Removed stale $pkg_dir/manifest.toml"
            fi
          done
        done <<< "$REPLACE_PATH_DEPS"

    - name: Publish packages
      id: publish
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        HEXPM_API_KEY: ${{ inputs.hex-api-key }}
        PACKAGES: ${{ inputs.packages }}
        SKIP_PUBLISHED: ${{ inputs.skip-already-published }}
      run: |
        PUBLISHED=""
        SKIPPED=""
        FAILED=""

        for pkg_dir in $PACKAGES; do
          if [ ! -d "$pkg_dir" ]; then
            echo "::error::Package directory not found: $pkg_dir"
            FAILED="${FAILED:+$FAILED }$pkg_dir"
            continue
          fi

          # Extract package name and version from gleam.toml
          pkg_name=$(grep '^name' "$pkg_dir/gleam.toml" | head -1 | sed 's/name = "\(.*\)"/\1/')
          pkg_version=$(grep '^version' "$pkg_dir/gleam.toml" | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "::group::$pkg_name@$pkg_version ($pkg_dir)"

          # Attempt to publish
          pushd "$pkg_dir" > /dev/null
          if output=$(gleam publish --yes 2>&1); then
            echo "$output"
            echo "✓ Published $pkg_name@$pkg_version"
            PUBLISHED="${PUBLISHED:+$PUBLISHED }$pkg_dir"
          else
            if echo "$output" | grep -qi "already published\|already exists\|version already"; then
              echo "$output"
              if [ "$SKIP_PUBLISHED" = "true" ]; then
                echo "· Skipped $pkg_name@$pkg_version (already published)"
                SKIPPED="${SKIPPED:+$SKIPPED }$pkg_dir"
              else
                echo "::error::$pkg_name@$pkg_version is already published"
                FAILED="${FAILED:+$FAILED }$pkg_dir"
              fi
            else
              echo "$output"
              echo "::error::Failed to publish $pkg_name@$pkg_version"
              FAILED="${FAILED:+$FAILED }$pkg_dir"
            fi
          fi
          popd > /dev/null
          echo "::endgroup::"
        done

        echo "published=$PUBLISHED" >> "$GITHUB_OUTPUT"
        echo "skipped=$SKIPPED" >> "$GITHUB_OUTPUT"

        # Summary
        echo "### Publish Results" >> "$GITHUB_STEP_SUMMARY"
        [ -n "$PUBLISHED" ] && echo "- **Published:** $PUBLISHED" >> "$GITHUB_STEP_SUMMARY"
        [ -n "$SKIPPED" ] && echo "- **Skipped:** $SKIPPED" >> "$GITHUB_STEP_SUMMARY"
        [ -n "$FAILED" ] && echo "- **Failed:** $FAILED" >> "$GITHUB_STEP_SUMMARY"

        if [ -n "$FAILED" ]; then
          echo "::error::Some packages failed to publish: $FAILED"
          exit 1
        fi
