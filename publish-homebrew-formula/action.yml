name: 'Publish Homebrew Formula'
description: 'Commit a dist-generated Homebrew formula to a tap repo using a GitHub App token (not a PAT).'

inputs:
  app-id:
    description: 'GitHub App ID. The app must be installed on the tap repo with contents:write.'
    required: true
  private-key:
    description: 'GitHub App private key (PEM).'
    required: true
  tap-repo:
    description: 'Tap repo in "owner/repo" form (e.g. "tylerbutler/homebrew-tap").'
    required: true
  plan:
    description: 'dist plan JSON. Pass ${{ inputs.plan }} from the calling reusable workflow.'
    required: true
  artifact-pattern:
    description: 'Pattern for actions/download-artifact. Matches dist default.'
    required: false
    default: 'artifacts-*'
  commit-user:
    description: 'git user.name for the commit.'
    required: false
    default: 'github-actions[bot]'
  commit-email:
    description: 'git user.email for the commit.'
    required: false
    default: '41898282+github-actions[bot]@users.noreply.github.com'
  install-linuxbrew:
    description: 'Install Linuxbrew and run `brew style --fix` on each formula before commit.'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Split tap-repo into owner and repo
      id: tap
      shell: bash
      env:
        TAP_REPO: ${{ inputs.tap-repo }}
      run: |
        set -euo pipefail
        if [[ "$TAP_REPO" != */* ]]; then
          echo "tap-repo must be in 'owner/repo' form, got: $TAP_REPO" >&2
          exit 1
        fi
        echo "owner=${TAP_REPO%%/*}" >> "$GITHUB_OUTPUT"
        echo "repo=${TAP_REPO#*/}"   >> "$GITHUB_OUTPUT"

    - name: Mint GitHub App token for tap repo
      id: app-token
      uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # ratchet:actions/create-github-app-token@v3
      with:
        app-id: ${{ inputs.app-id }}
        private-key: ${{ inputs.private-key }}
        owner: ${{ steps.tap.outputs.owner }}
        repositories: ${{ steps.tap.outputs.repo }}

    - name: Checkout tap
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # ratchet:actions/checkout@v4
      with:
        persist-credentials: true
        repository: ${{ inputs.tap-repo }}
        token: ${{ steps.app-token.outputs.token }}

    - name: Download formula artifacts
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # ratchet:actions/download-artifact@v4
      with:
        pattern: ${{ inputs.artifact-pattern }}
        path: Formula/
        merge-multiple: true

    - name: Commit and push formula files
      shell: bash
      env:
        PLAN: ${{ inputs.plan }}
        GIT_USER: ${{ inputs.commit-user }}
        GIT_EMAIL: ${{ inputs.commit-email }}
        INSTALL_LINUXBREW: ${{ inputs.install-linuxbrew }}
      run: |
        set -euo pipefail

        git config --global user.name  "$GIT_USER"
        git config --global user.email "$GIT_EMAIL"

        if [[ "$INSTALL_LINUXBREW" == "true" && -d /home/linuxbrew/.linuxbrew/bin ]]; then
          export PATH="/home/linuxbrew/.linuxbrew/bin:$PATH"
          brew update
        fi

        committed=0
        for release in $(echo "$PLAN" | jq --compact-output '.releases[] | select([.artifacts[] | endswith(".rb")] | any)'); do
          filename=$(echo "$release" | jq --raw-output '.artifacts[] | select(endswith(".rb"))')
          name=$(echo "$filename" | sed 's/\.rb$//')
          version=$(echo "$release" | jq --raw-output .app_version)

          if [[ "$INSTALL_LINUXBREW" == "true" && -d /home/linuxbrew/.linuxbrew/bin ]]; then
            brew style \
              --except-cops FormulaAudit/Homepage,FormulaAudit/Desc,FormulaAuditStrict \
              --fix "Formula/${filename}" || true
          fi

          git add "Formula/${filename}"
          git commit -m "${name} ${version}"
          committed=$((committed + 1))
        done

        if [[ "$committed" -gt 0 ]]; then
          git push
        else
          echo "No .rb formula artifacts found in plan — nothing to publish."
        fi

branding:
  icon: 'package'
  color: 'orange'
