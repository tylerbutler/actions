name: 'Setup Node.js Environment'
description: 'Standardized Node.js setup with pnpm and caching'

inputs:
  node-version:
    description: 'Node.js version'
    required: false
    default: '22'
  package-manager:
    description: 'Package manager to use: npm, pnpm, yarn, or bun'
    required: false
    default: 'pnpm'
  pnpm-version:
    description: 'pnpm version (only used if package-manager is pnpm)'
    required: false
    default: 'latest'
  cache:
    description: 'Whether to cache dependencies'
    required: false
    default: 'true'
  working-directory:
    description: 'Working directory for dependency installation'
    required: false
    default: '.'
  tools:
    description: 'Tools to install via taiki-e/install-action (comma-separated, e.g., "just,cargo-bloat")'
    required: false
    default: 'just'
  run-install:
    description: 'Whether to run package install'
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Install tools
      if: inputs.tools != ''
      uses: taiki-e/install-action@4573997e3b6c0fbc22f7acab193b00a8a3ca817d # ratchet:taiki-e/install-action@v2
      with:
        tool: ${{ inputs.tools }}

    - name: Setup pnpm
      if: inputs.package-manager == 'pnpm'
      uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # ratchet:pnpm/action-setup@v5
      with:
        version: ${{ inputs.pnpm-version }}

    - name: Setup Bun
      if: inputs.package-manager == 'bun'
      uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # ratchet:oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Setup Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # ratchet:actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: ${{ inputs.cache == 'true' && inputs.package-manager || '' }}
        cache-dependency-path: ${{ inputs.working-directory }}

    - name: Install dependencies (pnpm)
      if: inputs.run-install == 'true' && inputs.package-manager == 'pnpm'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: pnpm install --frozen-lockfile

    - name: Install dependencies (npm)
      if: inputs.run-install == 'true' && inputs.package-manager == 'npm'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: npm ci

    - name: Install dependencies (yarn)
      if: inputs.run-install == 'true' && inputs.package-manager == 'yarn'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: yarn install --frozen-lockfile

    - name: Install dependencies (bun)
      if: inputs.run-install == 'true' && inputs.package-manager == 'bun'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: bun install --frozen-lockfile
