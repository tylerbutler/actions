name: 'Changie Auto-tag'
description: 'Create version tags from the latest changie release(s)'

inputs:
  changie-version:
    description: 'Changie CLI version to install'
    required: false
    default: 'latest'
  working-directory:
    description: 'Directory containing .changie.yaml'
    required: false
    default: '.'
  tag-prefix:
    description: 'Prefix for the git tag (changie latest already includes "v", so default is empty)'
    required: false
    default: ''
  projects:
    description: |
      Comma-separated changie project keys for multi-package repos.
      When set, creates tags for each project that has a new version.
      Tags that already exist are skipped.
      Example: `vestibule,vestibule_apple,vestibule_google`
    required: false
    default: ''
  token:
    description: 'GitHub token for pushing the tag'
    required: false
    default: ${{ github.token }}
  create-release:
    description: 'Create a GitHub Release from the tag with changie version notes'
    required: false
    default: false
  wait-for-publish:
    description: 'Wait for the downstream publish workflow to complete after each pushed tag'
    required: false
    default: 'false'
  publish-workflow-name:
    description: 'Workflow name to wait for when wait-for-publish is true'
    required: false
    default: 'Publish'
  publish-wait-timeout-seconds:
    description: 'Maximum seconds to wait for each tag publish workflow'
    required: false
    default: '1800'
  publish-wait-poll-seconds:
    description: 'Seconds between publish workflow status checks'
    required: false
    default: '15'

outputs:
  version:
    description: 'The version(s) from changie latest (comma-separated in multi-project mode)'
    value: ${{ steps.version.outputs.version }}
  tag:
    description: 'The tag(s) that were created (comma-separated in multi-project mode)'
    value: ${{ steps.version.outputs.tag }}
  created-tags:
    description: 'Space-separated list of tags actually created (excludes already-existing tags)'
    value: ${{ steps.version.outputs.created-tags }}

runs:
  using: composite
  steps:
    - name: Install changie
      uses: miniscruff/changie-action@5036dffa79ffc007110dc7f75eca7ef72780e147 # ratchet:miniscruff/changie-action@v2.1.0
      with:
        version: ${{ inputs.changie-version }}

    - name: Read project configuration
      id: config
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        PROJECTS: ${{ inputs.projects }}
      run: |
        if [ -n "$PROJECTS" ]; then
          CHANGES_DIR=$(grep '^changesDir:' .changie.yaml | awk '{print $2}' || echo ".changie.d")
          SEP=$(grep '^projectsVersionSeparator:' .changie.yaml | awk '{print $2}' | tr -d "\"'" 2>/dev/null || true)
          echo "changes-dir=${CHANGES_DIR}" >> "$GITHUB_OUTPUT"
          echo "separator=${SEP:--}" >> "$GITHUB_OUTPUT"
        fi

    - name: Get version and create tags
      id: version
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        PREFIX: ${{ inputs.tag-prefix }}
        PROJECTS: ${{ inputs.projects }}
        GITHUB_TOKEN: ${{ inputs.token }}
        WAIT_FOR_PUBLISH: ${{ inputs.wait-for-publish }}
        PUBLISH_WORKFLOW_NAME: ${{ inputs.publish-workflow-name }}
        PUBLISH_WAIT_TIMEOUT_SECONDS: ${{ inputs.publish-wait-timeout-seconds }}
        PUBLISH_WAIT_POLL_SECONDS: ${{ inputs.publish-wait-poll-seconds }}
        GH_TOKEN: ${{ inputs.token }}
      run: |
        wait_for_publish() {
          tag="$1"
          if [ "${WAIT_FOR_PUBLISH:-false}" != "true" ]; then
            return 0
          fi

          echo "Waiting for publish workflow '$PUBLISH_WORKFLOW_NAME' for tag $tag"
          start=$(date +%s)
          timeout="${PUBLISH_WAIT_TIMEOUT_SECONDS:-1800}"
          poll="${PUBLISH_WAIT_POLL_SECONDS:-15}"

          while true; do
            run_id=""
            if runs=$(gh run list --workflow "$PUBLISH_WORKFLOW_NAME" --branch "$tag" --limit 1 --json databaseId,status,conclusion,headBranch 2>&1); then
              if ! run_id=$(printf '%s' "$runs" | jq -r '.[0].databaseId // empty' 2>/dev/null); then
                echo "Failed to parse publish workflow list for tag $tag; retrying" >&2
                run_id=""
              fi
            else
              echo "Failed to list publish workflow runs for tag $tag; retrying: $runs" >&2
            fi
            if [ -n "$run_id" ]; then
              echo "Found publish workflow run $run_id for tag $tag"
              break
            fi
            now=$(date +%s)
            if [ $((now - start)) -ge "$timeout" ]; then
              echo "Timed out waiting for publish workflow '$PUBLISH_WORKFLOW_NAME' for tag $tag" >&2
              return 1
            fi
            sleep "$poll"
          done

          while true; do
            if ! run=$(gh run view "$run_id" --json status,conclusion 2>&1); then
              echo "Failed to read publish workflow run $run_id for tag $tag: $run" >&2
              return 1
            fi
            if ! status=$(printf '%s' "$run" | jq -r '.status // empty' 2>/dev/null); then
              echo "Failed to read publish workflow run $run_id for tag $tag" >&2
              return 1
            fi
            if ! conclusion=$(printf '%s' "$run" | jq -r '.conclusion // empty' 2>/dev/null); then
              echo "Failed to read publish workflow run $run_id for tag $tag" >&2
              return 1
            fi
            if [ "$status" = "completed" ]; then
              if [ "$conclusion" = "success" ]; then
                echo "Publish workflow run $run_id for tag $tag completed successfully"
                return 0
              fi
              echo "Publish workflow run $run_id for tag $tag completed with conclusion $conclusion" >&2
              return 1
            fi
            now=$(date +%s)
            if [ $((now - start)) -ge "$timeout" ]; then
              echo "Timed out waiting for publish workflow '$PUBLISH_WORKFLOW_NAME' for tag $tag" >&2
              return 1
            fi
            sleep "$poll"
          done
        }

        if [ -n "$PROJECTS" ]; then
          CREATED_TAGS=""
          ALL_VERSIONS=""
          ALL_TAGS=""
          IFS=',' read -ra PROJECT_LIST <<< "$PROJECTS"
          for raw_project in "${PROJECT_LIST[@]}"; do
            project=$(echo "$raw_project" | xargs)
            version=$(changie latest --project "$project" 2>/dev/null || true)
            if [ -z "$version" ]; then
              echo "Could not resolve version for $project, skipping"
              continue
            fi
            tag="${PREFIX}${version}"
            ALL_VERSIONS="${ALL_VERSIONS:+$ALL_VERSIONS, }$version"
            ALL_TAGS="${ALL_TAGS:+$ALL_TAGS, }$tag"
            if git tag -l "$tag" | grep -q .; then
              echo "Tag $tag already exists, skipping"
              continue
            fi
            if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
              echo "Tag $tag already exists on origin, skipping"
              continue
            else
              status=$?
              if [ "$status" -ne 2 ]; then
                echo "Failed to check whether tag $tag exists on origin" >&2
                exit "$status"
              fi
            fi
            git tag "$tag"
            CREATED_TAGS="${CREATED_TAGS:+$CREATED_TAGS }$tag"
            echo "Created tag: $tag"
          done

          if [ -n "$CREATED_TAGS" ]; then
            # Push tags one at a time so each generates a push event.
            # GitHub does not fire push events when >3 tags are pushed at once.
            for t in $CREATED_TAGS; do
              git push origin "$t"
              wait_for_publish "$t" || exit $?
            done
          else
            echo "No new tags to push"
          fi

          echo "version=$ALL_VERSIONS" >> "$GITHUB_OUTPUT"
          echo "tag=$ALL_TAGS" >> "$GITHUB_OUTPUT"
          echo "created-tags=$CREATED_TAGS" >> "$GITHUB_OUTPUT"
        else
          version=$(changie latest)
          tag="${PREFIX}${version}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          if git tag -l "$tag" | grep -q .; then
            echo "Tag $tag already exists, skipping"
            echo "created-tags=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists on origin, skipping"
            echo "created-tags=" >> "$GITHUB_OUTPUT"
            exit 0
          else
            status=$?
            if [ "$status" -ne 2 ]; then
              echo "Failed to check whether tag $tag exists on origin" >&2
              exit "$status"
            fi
          fi
          echo "created-tags=$tag" >> "$GITHUB_OUTPUT"
          git tag "$tag"
          git push origin "$tag"
          wait_for_publish "$tag" || exit $?
        fi

    - name: Create GitHub Releases
      if: inputs.create-release == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        GH_TOKEN: ${{ inputs.token }}
        PROJECTS: ${{ inputs.projects }}
        PREFIX: ${{ inputs.tag-prefix }}
        CREATED_TAGS: ${{ steps.version.outputs.created-tags }}
        CHANGES_DIR: ${{ steps.config.outputs.changes-dir }}
        SEPARATOR: ${{ steps.config.outputs.separator }}
      run: |
        if [ -z "$CREATED_TAGS" ]; then
          echo "No newly-created tag needs a release"
          exit 0
        fi

        if [ -n "$PROJECTS" ]; then
          # Multi-project: create a release for each newly-created tag
          IFS=',' read -ra PROJECT_LIST <<< "$PROJECTS"
          for raw_project in "${PROJECT_LIST[@]}"; do
            project=$(echo "$raw_project" | xargs)
            version=$(changie latest --project "$project" 2>/dev/null || true)
            [ -z "$version" ] && continue
            tag="${PREFIX}${version}"

            # Only create releases for tags we just created
            if ! echo " $CREATED_TAGS " | grep -q " $tag "; then
              continue
            fi

            # Resolve changelog file: .changes/{project}/{version_suffix}.md
            ver_suffix="${version#"${project}${SEPARATOR}"}"
            NOTES_FILE="${CHANGES_DIR}/${project}/${ver_suffix}.md"

            echo "Creating release for $tag"
            if [ -f "$NOTES_FILE" ]; then
              gh release create "$tag" --title "$tag" --notes-file "$NOTES_FILE"
            else
              gh release create "$tag" --title "$tag" --generate-notes
            fi
          done
        else
          TAG="$CREATED_TAGS"
          VERSION=$(changie latest)
          NOTES_FILE="${CHANGES_DIR:-".changes"}/${VERSION}.md"
          if [ -f "$NOTES_FILE" ]; then
            gh release create "$TAG" --title "$TAG" --notes-file "$NOTES_FILE"
          else
            gh release create "$TAG" --title "$TAG" --generate-notes
          fi
        fi
